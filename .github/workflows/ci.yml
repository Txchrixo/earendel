name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel previous runs on the same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---- Brique 1: Frontend lint ----
  frontend-lint:
    name: Frontend Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache bun dependencies
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run ESLint
        run: bun run lint

  # ---- Brique 2: Frontend tests (vitest) ----
  frontend-tests:
    name: Frontend Tests (73)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache bun dependencies
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install vitest plugin
        run: bun add -d @vitejs/plugin-react

      - name: Run vitest
        run: bunx vitest run --reporter=verbose

  # ---- Brique 3: Backend tests (pytest) ----
  backend-tests:
    name: Backend Tests (361)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('backend/requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          pip install -r backend/requirements.txt
          pip install pytest pytest-asyncio httpx bcrypt PyJWT

      - name: Run pytest
        run: |
          cd backend
          python -m pytest tests/ -v --tb=short
        env:
          EARENDEL_SEED_ON_STARTUP: "false"

  # ---- Brique 4: E2E tests (playwright) ----
  e2e-tests:
    name: E2E Tests (3)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache bun dependencies
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend dependencies
        run: |
          pip install -r backend/requirements.txt
          pip install bcrypt PyJWT

      - name: Install Playwright browsers
        run: bunx playwright install --with-deps chromium

      - name: Start backend
        run: |
          cd backend
          python -m uvicorn app.main:app --host 0.0.0.0 --port 8001 &
          sleep 8
          curl -sf http://localhost:8001/api/v1/healthz || exit 1
        env:
          EARENDEL_SEED_ON_STARTUP: "true"

      - name: Start Next.js
        run: |
          bun run dev &
          sleep 15
          curl -sf http://localhost:3000/ || exit 1
        env:
          NEXTAUTH_URL: "http://localhost:3000"
          NEXTAUTH_SECRET: "ci-test-secret-do-not-use-in-production"
          BACKEND_SECRET: "ci-test-secret-do-not-use-in-production"
          DATABASE_URL: "file:./ci-e2e.db"

      - name: Run Playwright tests
        run: bunx playwright test --reporter=list
        env:
          PLAYWRIGHT_BASE_URL: "http://localhost:3000"

  # ---- Brique 5: Build check ----
  build:
    name: Build Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache bun dependencies
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Generate Prisma client
        run: bun run db:generate

      - name: Push Prisma schema
        run: bun run db:push
        env:
          DATABASE_URL: "file:./ci-build.db"

      - name: Build Next.js
        run: bun run build
        env:
          DATABASE_URL: "file:./ci-build.db"
          NEXTAUTH_URL: "http://localhost:3000"
          NEXTAUTH_SECRET: "ci-build-secret"
          BACKEND_SECRET: "ci-build-secret"
          GOOGLE_CLIENT_ID: "test"
          GOOGLE_CLIENT_SECRET: "test"
          STRIPE_SECRET: ""
