# Earendel — Docker Compose for local development + production staging
#
# Services:
#   - frontend  (Next.js, port 3000)
#   - backend   (FastAPI, port 8001)
#   - mcp       (MCP server, port 3004)
#   - stream    (Execution stream, port 3003)
#   - db        (PostgreSQL for production, port 5432)
#   - caddy     (Reverse proxy / gateway, port 81)

version: "3.9"

services:
  # ---- Database (PostgreSQL for production) ----
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: earendel
      POSTGRES_USER: earendel
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-earendel-dev}
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U earendel"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---- Backend (FastAPI) ----
  backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: backend
    ports:
      - "8001:8001"
    environment:
      - DATABASE_URL=postgresql://earendel:${DATABASE_PASSWORD:-earendel-dev}@db:5432/earendel
      - BACKEND_SECRET=${BACKEND_SECRET:-dev-secret-change-me}
      - SEED_ON_STARTUP=true
      - EARENDEL_DEMO_MODE=false
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  # ---- Frontend (Next.js) ----
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      target: frontend
    ports:
      - "3000:3000"
    environment:
      - NEXTAUTH_URL=http://localhost:3000
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET:-dev-secret-change-me}
      - BACKEND_SECRET=${BACKEND_SECRET:-dev-secret-change-me}
    depends_on:
      - backend
    restart: unless-stopped

  # ---- MCP Server ----
  mcp:
    image: oven/bun:latest
    working_dir: /app
    command: bun run index.ts
    volumes:
      - ./mini-services/mcp-server:/app
    ports:
      - "3004:3004"
    environment:
      - BACKEND_URL=http://backend:8001
      - BACKEND_SECRET=${BACKEND_SECRET:-dev-secret-change-me}
    depends_on:
      - backend
    restart: unless-stopped

  # ---- Execution Stream (Socket.io) ----
  stream:
    image: oven/bun:latest
    working_dir: /app
    command: bun run index.ts
    volumes:
      - ./mini-services/execution-stream:/app
    ports:
      - "3003:3003"
    restart: unless-stopped

  # ---- Gateway (Caddy) ----
  caddy:
    image: caddy:2-alpine
    ports:
      - "81:81"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
    depends_on:
      - frontend
      - backend
    restart: unless-stopped

volumes:
  db_data:
